name: Publish .NET Global Tool

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    permissions:
      id-token: write
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore TiaMcpServer.sln

      - name: Build and Pack
        run: dotnet pack TiaMcpServer/TiaMcpServer.csproj -c Release --no-restore -o ./out

       # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user:  ${{ secrets.NUGET_USER }}
    
      # Push the package
      - name: NuGet push
        run: dotnet nuget push "~/tia-portal-mcp/out/*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish Standalone Binary
        run: dotnet publish TiaMcpServer/TiaMcpServer.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:PackAsTool=false -o ./publish-bin

      - name: Zip Standalone Binary
        run: Compress-Archive -Path ./publish-bin/* -DestinationPath ./out/tia-mcp-windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.nupkg
            out/tia-mcp-windows-x64.zip
          generate_release_notes: true
